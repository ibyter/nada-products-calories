<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سعرات ندى الحرارية</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00833D;
      --green-dark: #005C2B;
      --green-mid:  #00A34C;
      --green-light:#E8F5ED;
      --amber:      #C96800;
      --red:        #C8200A;
      --bg:         #F0F2F1;
      --surface:    #FFFFFF;
      --border:     #DEE4E0;
      --text:       #111B15;
      --muted:      #687D71;
      --radius:     14px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
    }

    /* ── Header ── */
    .header { background: var(--green); }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
    }
    .header-brand h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 5px;
    }
    .header-brand p { font-size: 13px; color: rgba(255,255,255,.7); }
    .header-stats { display: flex; gap: 10px; flex-shrink: 0; }
    .stat-box {
      text-align: center;
      background: rgba(255,255,255,.13);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 10px;
      padding: 10px 16px;
      min-width: 72px;
    }
    .stat-box strong {
      display: block;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 3px;
    }
    .stat-box span { font-size: 11px; color: rgba(255,255,255,.7); font-weight: 500; }

    /* ── Controls ── */
    .controls { max-width: 1280px; margin: 0 auto; padding: 18px 20px 0; }

    .search-wrap { position: relative; margin-bottom: 12px; }
    .search-wrap input {
      width: 100%;
      padding: 11px 16px 11px 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .18s;
      direction: rtl;
    }
    .search-wrap input:focus { border-color: var(--green); }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    /* Scrollable category row */
    .filter-scroll-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin-bottom: 10px;
    }
    .filter-scroll-wrap::-webkit-scrollbar { display: none; }
    .filter-scroll { display: flex; gap: 6px; width: max-content; padding-bottom: 2px; }

    /* Second row: calorie range label + scrollable pills */
    .filter-row2 {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .filter-section-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .07em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .cal-scroll-wrap {
      flex: 1;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .cal-scroll-wrap::-webkit-scrollbar { display: none; }
    .cal-scroll { display: flex; gap: 6px; width: max-content; padding-bottom: 2px; }

    .pill {
      padding: 6px 14px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      user-select: none;
      flex-shrink: 0;
    }
    .pill:hover { border-color: var(--green); color: var(--green); }
    .pill.active { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }

    .sort-select {
      padding: 7px 12px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
      flex-shrink: 0;
      max-width: 180px;
    }
    .sort-select:focus { border-color: var(--green); }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 0 14px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }
    .results-bar strong { color: var(--text); font-weight: 600; }

    /* ── Grid ── */
    .grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px 56px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,.09), 0 2px 8px rgba(0,0,0,.05);
      transform: translateY(-3px);
    }

    /* Image */
    .card-img {
      aspect-ratio: 4 / 3;
      background: #F7F9F8;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      flex-shrink: 0;
    }
    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 16px;
      transition: transform .3s ease;
    }
    .card:hover .card-img img { transform: scale(1.06); }

    /* Body */
    .card-body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      flex: 1;
    }

    /* Category badge */
    .cat-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
      align-self: flex-start;
    }
    .cat-labneh          { background: #E0F0EA; color: #175E35; }
    .cat-greek-yogurt    { background: #DDEEFB; color: #1A4E7A; }
    .cat-drinking-yogurt { background: #D9ECFB; color: #1B5778; }
    .cat-yogurt          { background: #E2F0FD; color: #1565C0; }
    .cat-legumes         { background: #FEF3C7; color: #78520A; }
    .cat-juice           { background: #FDE8D8; color: #7A2D0B; }
    .cat-milk            { background: #F3E8FF; color: #5B21B6; }
    .cat-protein-milk    { background: #FCE7F3; color: #831843; }
    .cat-plant-based     { background: #ECFDF5; color: #064E3B; }
    .cat-other           { background: #F1F5F9; color: #475569; }

    /* Name */
    .card-name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Calorie block */
    .cal-block { display: flex; flex-direction: column; gap: 6px; }
    .cal-top { display: flex; align-items: baseline; gap: 7px; }
    .cal-num {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .cal-num.high { color: var(--red); }
    .cal-num.mid  { color: var(--amber); }
    .cal-num.low  { color: var(--green); }
    .cal-num.none { font-size: 15px; color: var(--muted); font-weight: 600; }
    .cal-lbl { font-size: 12px; color: var(--muted); font-weight: 500; }
    .bar-track {
      height: 5px;
      background: var(--bg);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .5s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.high { background: linear-gradient(to left, var(--red), var(--amber)); }
    .bar-fill.mid  { background: linear-gradient(to left, var(--amber), var(--green-mid)); }
    .bar-fill.low  { background: var(--green); }
    .bar-fill.none { background: var(--border); }

    /* Card footer: meta + CTA */
    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      margin-top: auto;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12.5px;
      color: var(--muted);
      flex-wrap: wrap;
      min-width: 0;
    }
    .card-meta strong { color: var(--text); font-weight: 600; }
    .sep { opacity: .4; }
    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12.5px;
      font-weight: 700;
      color: var(--green);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      transition: color .15s, gap .15s;
    }
    .card-cta:hover { color: var(--green-dark); gap: 7px; }
    .card-cta svg { transition: transform .15s; }
    .card-cta:hover svg { transform: translateX(-2px); }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    .empty svg { display: block; margin: 0 auto 16px; opacity: .3; }
    .empty h2 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px 20px 32px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      max-width: 1280px;
      margin: 0 auto;
    }
    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .header-stats { display: none; }
      .header-inner { padding: 20px 16px 18px; }
      .controls { padding: 14px 14px 0; }
      .grid { padding: 0 14px 40px; gap: 12px; }
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .card-body { padding: 10px 12px 12px; gap: 7px; }
      .cal-num { font-size: 26px; }
    }
  </style>
</head>

    { id:89, name:'لبن طازج قليل الدسم', url:'https://nada.com.sa/en/product/fresh-laban-low-fat/', serving:'100 مل', cal:41, prot:3.1, protStr:'3.1 جم', cat:'milk', img:'images/Laban_LowFat-180mlL-English-1-600x600.jpg' },
    { id:90, name:'حليب طويل الأجل قليل الدسم', url:'https://nada.com.sa/en/product/long-life-milk-low-fat/', serving:'100 مل', cal:41, prot:3.1, protStr:'3.1 جم', cat:'milk', img:'images/UHT_Milk-LowFat-English-600x600.jpg' },
    { id:91, name:'عصير جريب فروت عالي الجودة فلوريدا ناتشورال', url:'https://nada.com.sa/en/product/premium-grapefruit-floridas-natural-juice/', serving:'100 مل', cal:38, prot:0.0, protStr:'0.0 جم', cat:'juice', img:'images/Grapefruit_1.6L_FN_Packshot_Eng-1-600x600.jpg' },
    { id:92, name:'مشروب اللوز العضوي', url:'https://nada.com.sa/en/product/organic-almond-drink/', serving:'100 مل', cal:34, prot:0.8, protStr:'0.8 جم', cat:'plant-based', img:'images/Nada-Communication-Logo-600x600.png' },
    { id:93, name:'حليب طازج منزوع الدسم', url:'https://nada.com.sa/en/product/fresh-milk-skimmed/', serving:'100 مل', cal:31, prot:3.1, protStr:'3.1 جم', cat:'milk', img:'images/1.75L-Skimmed-Milk-English-600x600.jpg' },
    { id:94, name:'حليب طويل الأجل منزوع الدسم', url:'https://nada.com.sa/en/product/long-life-skimmed-milk/', serving:'100 مل', cal:31, prot:3.1, protStr:'3.1 جم', cat:'milk', img:'images/UHT_Milk-Skimmed-English-600x600.jpg' },
    { id:95, name:'عيران – شراب اللبن الطازج', url:'https://nada.com.sa/en/product/aryan-fresh-laban-drink/', serving:'100 مل', cal:29, prot:2.0, protStr:'2.0 جم', cat:'milk', img:'images/Ayran-180mlL-English-600x600.jpg' },
    { id:96, name:'عصير برتقال بدون اللب عالي الجودة فلوريدا ناتشورال', url:'https://nada.com.sa/en/product/premium-orange-no-pulp-floridas-natural-juice/', serving:'—', cal:null, prot:1.0, protStr:'1.0 جم', cat:'juice', img:'images/Orange-No-Pulp_1.6L_FN_Packshot_Eng-1-600x600.jpg' },
  ];

  const MAX_CAL = 213;

  let activeCat = 'all';
  let activeCal = 'all';
  let sortMode  = 'cal-desc';
  let searchQ   = '';

  function calTier(cal) {
    if (cal === null) return 'none';
    if (cal >= 150) return 'high';
    if (cal >= 70)  return 'mid';
    return 'low';
  }

  function buildCard(p) {
    const tier = calTier(p.cal);
    const pct  = p.cal !== null ? Math.round((p.cal / MAX_CAL) * 100) : 0;
    const calDisplay = p.cal !== null
      ? `<span class="cal-num ${tier}">${Math.round(p.cal)}</span><span class="cal-lbl">سعرة حرارية</span>`
      : `<span class="cal-num none">غير محدد</span>`;

    const imgBlock = p.img
      ? `<div class="card-img"><img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.closest('.card-img').style.display='none'"></div>`
      : '';

    return `<article class="card">
      ${imgBlock}
      <div class="card-body">
        <span class="cat-badge cat-${p.cat}">${CAT_LABELS[p.cat]}</span>
        <h2 class="card-name">${p.name}</h2>
        <div class="cal-block">
          <div class="cal-top">${calDisplay}</div>
          <div class="bar-track"><div class="bar-fill ${tier}" style="width:${pct}%"></div></div>
        </div>
        <div class="card-foot">
          <div class="card-meta">
            <span>بروتين <strong>${p.protStr}</strong></span>
            <span class="sep">·</span>
            <span>${p.serving}</span>
          </div>
          <a href="${p.url}" target="_blank" rel="noopener" class="card-cta" aria-label="عرض صفحة ${p.name} على موقع ندى">
            عرض
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
        </div>
      </div>
    </article>`;
  }

  function getFiltered() {
    let list = [...products];

    if (activeCat !== 'all') list = list.filter(p => p.cat === activeCat);

    if (activeCal === 'low')  list = list.filter(p => p.cal !== null && p.cal < 70);
    if (activeCal === 'mid')  list = list.filter(p => p.cal !== null && p.cal >= 70 && p.cal <= 120);
    if (activeCal === 'high') list = list.filter(p => p.cal !== null && p.cal > 120);

    if (searchQ) {
      const q = searchQ;
      list = list.filter(p => p.name.includes(q));
    }

    if (sortMode === 'cal-desc')  list.sort((a, b) => (b.cal ?? -1) - (a.cal ?? -1));
    if (sortMode === 'cal-asc')   list.sort((a, b) => (a.cal ?? 999) - (b.cal ?? 999));
    if (sortMode === 'prot-desc') list.sort((a, b) => (b.prot ?? -1) - (a.prot ?? -1));
    if (sortMode === 'name')      list.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

    return list;
  }

  function render() {
    const filtered = getFiltered();
    const grid = document.getElementById('grid');
    document.getElementById('results-count').textContent = filtered.length;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6m-3-3v6"/>
        </svg>
        <h2>لا توجد نتائج</h2>
        <p>جرّب تغيير الفلتر أو مصطلح البحث</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(buildCard).join('');
  }

  // Category pills
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      render();
    });
  });

  // Calorie range pills
  document.querySelectorAll('[data-cal]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-cal]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCal = btn.dataset.cal;
      render();
    });
  });

  // Sort
  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    render();
  });

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    render();
  });

  render();
</script>
</body>
</html>
