<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>سعرات ندى الحرارية</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:      #00833D;
      --green-dark: #005C2B;
      --green-mid:  #00A34C;
      --green-pale: #E6F4ED;
      --green-chip: #C8E9D7;
      --amber:      #D97706;
      --amber-pale: #FEF3C7;
      --red:        #DC2626;
      --red-pale:   #FEE2E2;
      --bg:         #F4F8F6;
      --surface:    #FFFFFF;
      --border:     #D6E8DC;
      --text:       #142B1E;
      --muted:      #5A7A68;
      --radius:     12px;
      --shadow:     0 1px 3px rgba(0,80,40,.07), 0 4px 12px rgba(0,80,40,.05);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Cairo', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      line-height: 1.6;
    }

    /* ── Header ── */
    .header {
      background: var(--green);
      color: #fff;
      padding: 28px 24px 24px;
      text-align: center;
    }
    .header-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .header-logo svg { flex-shrink: 0; }
    .header h1 {
      font-size: clamp(22px, 5vw, 32px);
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .header p {
      font-size: 14px;
      color: rgba(255,255,255,.75);
      margin-top: 4px;
    }
    .header-stats {
      display: inline-flex;
      gap: 24px;
      margin-top: 16px;
      background: rgba(255,255,255,.12);
      border-radius: 40px;
      padding: 8px 20px;
      font-size: 13px;
    }
    .header-stats span { color: rgba(255,255,255,.9); }
    .header-stats strong { color: #fff; font-weight: 700; }

    /* ── Controls ── */
    .controls {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 20px 0;
    }

    .search-bar {
      position: relative;
      margin-bottom: 14px;
    }
    .search-bar input {
      width: 100%;
      padding: 11px 16px 11px 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color .18s;
      direction: rtl;
    }
    .search-bar input:focus { border-color: var(--green); }
    .search-bar input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .filter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-left: 4px;
      white-space: nowrap;
    }

    .pill {
      padding: 6px 14px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
      user-select: none;
    }
    .pill:hover { border-color: var(--green); color: var(--green); }
    .pill.active {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
      font-weight: 600;
    }

    .sort-select {
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface);
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      outline: none;
      transition: border-color .15s;
      margin-right: auto;
    }
    .sort-select:focus { border-color: var(--green); }

    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .results-bar strong { color: var(--text); font-weight: 600; }

    /* ── Grid ── */
    .grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px 48px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .15s, box-shadow .15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,80,40,.10), 0 1px 4px rgba(0,80,40,.06);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .card-name {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.45;
      flex: 1;
    }
    .card-name a {
      color: inherit;
      text-decoration: none;
      transition: color .15s;
    }
    .card-name a:hover { color: var(--green); }

    .cat-badge {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* Category color coding */
    .cat-labneh       { background: #E0F0EA; color: #175E35; }
    .cat-greek-yogurt { background: #D6EAF8; color: #1A4E7A; }
    .cat-drinking-yogurt { background: #D5EEF9; color: #1B5778; }
    .cat-yogurt       { background: #E3F2FD; color: #1565C0; }
    .cat-legumes      { background: #FFF3CD; color: #7D5A00; }
    .cat-juice        { background: #FDE8D8; color: #7A2D0B; }
    .cat-milk         { background: #F3E8FF; color: #5B21B6; }
    .cat-protein-milk { background: #FCE7F3; color: #831843; }
    .cat-plant-based  { background: #ECFDF5; color: #064E3B; }
    .cat-other        { background: #F1F5F9; color: #475569; }

    /* ── Calorie bar ── */
    .cal-section { display: flex; flex-direction: column; gap: 6px; }

    .cal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .cal-label { font-size: 11.5px; color: var(--muted); font-weight: 500; }
    .cal-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .cal-value.high  { color: var(--red); }
    .cal-value.mid   { color: var(--amber); }
    .cal-value.low   { color: var(--green); }
    .cal-value.none  { font-size: 14px; color: var(--muted); }
    .cal-unit { font-size: 12px; font-weight: 500; color: var(--muted); }

    .bar-track {
      height: 6px;
      background: var(--bg);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width .4s cubic-bezier(.4,0,.2,1);
    }
    .bar-fill.high  { background: linear-gradient(90deg, var(--amber), var(--red)); }
    .bar-fill.mid   { background: linear-gradient(90deg, var(--green-mid), var(--amber)); }
    .bar-fill.low   { background: var(--green); }

    /* ── Meta row ── */
    .meta-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-top: 1px solid var(--green-pale);
      padding-top: 10px;
    }
    .meta-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      background: var(--bg);
      border-radius: 20px;
      padding: 4px 10px;
    }
    .meta-chip strong { color: var(--text); font-weight: 600; }
    .meta-chip svg { flex-shrink: 0; }

    /* ── Product link CTA ── */
    .card-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 2px;
      padding: 9px 13px;
      border-radius: 8px;
      background: var(--green-pale);
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid var(--green-chip);
      transition: background .15s, border-color .15s, color .15s;
    }
    .card-link:hover {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }
    .card-link:hover svg { stroke: #fff; }
    .card-link svg { transition: stroke .15s; flex-shrink: 0; }
    .card-link-text { display: flex; align-items: center; gap: 6px; }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--muted);
    }
    .empty svg { display: block; margin: 0 auto 16px; opacity: .35; }
    .empty h2 { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .empty p { font-size: 14px; }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 16px 20px 32px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      max-width: 1280px;
      margin: 0 auto;
    }
    footer a { color: var(--green); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .header { padding: 22px 16px 18px; }
      .header-stats { gap: 16px; font-size: 12px; }
      .controls { padding: 14px 14px 0; }
      .grid { padding: 0 14px 40px; gap: 10px; }
      .sort-select { margin-right: 0; width: 100%; }
    }
  </style>
</head>

  const MAX_CAL = 213;

  let activeCat = 'all';
  let activeCal = 'all';
  let sortMode  = 'cal-desc';
  let searchQ   = '';

  function calTier(cal) {
    if (cal === null) return 'none';
    if (cal >= 150) return 'high';
    if (cal >= 70)  return 'mid';
    return 'low';
  }

  function buildCard(p) {
    const tier   = calTier(p.cal);
    const pct    = p.cal !== null ? Math.round((p.cal / MAX_CAL) * 100) : 0;
    const calDisplay = p.cal !== null
      ? `<span class="cal-value ${tier}">${Math.round(p.cal)}</span><span class="cal-unit">سعرة حرارية</span>`
      : `<span class="cal-value none">غير محدد</span>`;

    return `<article class="card">
      <div class="card-top">
        <h2 class="card-name">${p.name}</h2>
        <span class="cat-badge cat-${p.cat}">${CAT_LABELS[p.cat]}</span>
      </div>
      <div class="cal-section">
        <div class="cal-row">${calDisplay}</div>
        <div class="bar-track"><div class="bar-fill ${tier}" style="width:${pct}%"></div></div>
      </div>
      <div class="meta-row">
        <span class="meta-chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-9 13-9 13S3 15.97 3 11a9 9 0 0 1 9-9z"/><circle cx="12" cy="11" r="3"/></svg>
          <strong>${p.serving}</strong>
        </span>
        <span class="meta-chip">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          بروتين: <strong>${p.protStr}</strong>
        </span>
      </div>
      <a href="${p.url}" target="_blank" rel="noopener" class="card-link" aria-label="عرض صفحة ${p.name} على موقع ندى">
        <span class="card-link-text">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6v6"/><path d="M9 15 15 9"/></svg>
          عرض المنتج على ندى
        </span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </a>
    </article>`;
  }

  function getFiltered() {
    let list = [...products];

    if (activeCat !== 'all') list = list.filter(p => p.cat === activeCat);

    if (activeCal === 'low')  list = list.filter(p => p.cal !== null && p.cal < 70);
    if (activeCal === 'mid')  list = list.filter(p => p.cal !== null && p.cal >= 70 && p.cal <= 120);
    if (activeCal === 'high') list = list.filter(p => p.cal !== null && p.cal > 120);

    if (searchQ) {
      const q = searchQ;
      list = list.filter(p => p.name.includes(q));
    }

    if (sortMode === 'cal-desc')  list.sort((a, b) => (b.cal ?? -1) - (a.cal ?? -1));
    if (sortMode === 'cal-asc')   list.sort((a, b) => (a.cal ?? 999) - (b.cal ?? 999));
    if (sortMode === 'prot-desc') list.sort((a, b) => (b.prot ?? -1) - (a.prot ?? -1));
    if (sortMode === 'name')      list.sort((a, b) => a.name.localeCompare(b.name, 'ar'));

    return list;
  }

  function render() {
    const filtered = getFiltered();
    const grid = document.getElementById('grid');
    document.getElementById('results-count').textContent = filtered.length;

    if (filtered.length === 0) {
      grid.innerHTML = `<div class="empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/><path d="M8 11h6m-3-3v6"/>
        </svg>
        <h2>لا توجد نتائج</h2>
        <p>جرّب تغيير الفلتر أو مصطلح البحث</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(buildCard).join('');
  }

  // Category pills
  document.querySelectorAll('[data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-cat]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      render();
    });
  });

  // Calorie range pills
  document.querySelectorAll('[data-cal]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-cal]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCal = btn.dataset.cal;
      render();
    });
  });

  // Sort
  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    render();
  });

  // Search
  document.getElementById('search-input').addEventListener('input', e => {
    searchQ = e.target.value.trim();
    render();
  });

  render();
</script>
</body>
</html>
